[pytest]
# 测试配置

# 测试路径
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 标记定义
markers =
    asyncio: 异步测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    unit: 单元测试

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    --ignore=tests/test_api.py
    --ignore=tests/test_courses.py
    --ignore=tests/test_students.py
    --ignore=tests/test_student_api.py
    --ignore=tests/test_end_to_end.py
    --ignore=tests/test_payment_callback_handler.py
    --ignore=tests/test_wechat_pay.py

# 覆盖率配置
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
